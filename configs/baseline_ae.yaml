experiment:
  name: baseline_ae
  seed: 0
  device: cuda

data:
  dataset: cifar10
  data_dir: ./data
  batch_size: 128
  num_workers: 0

model:
  type: conv_autoencoder
  latent_dim: 128

training:
  epochs: 60
  lr: 0.1
  optimizer: sgd
  loss: mse

trigger:
  type: fixed
  schedule: [128]

evaluation:
  linear_probe: true
  knn: true
  ordering_score: true