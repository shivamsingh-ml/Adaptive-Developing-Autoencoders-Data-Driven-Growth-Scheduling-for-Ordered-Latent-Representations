experiment:
  name: baseline_pca_ae
  seed: 0
  device: cuda

data:
  dataset: cifar10
  data_dir: ./data
  batch_size: 128
  num_workers: 0

model:
  type: conv_autoencoder
  latent_dim: 128

training:
  epochs: 60
  lr: 0.1
  optimizer: sgd
  loss: mse
  pca_init: true          # triggers PCA initialization
  freeze_until_epoch: 20  # freeze bottleneck for first 20 epochs

trigger:
  type: fixed
  schedule: [128]

evaluation:
  linear_probe: true
  knn: true
  intrinsic_dim: true
  ordering_score: true