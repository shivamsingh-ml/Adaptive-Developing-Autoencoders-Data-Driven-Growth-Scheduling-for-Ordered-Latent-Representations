experiment:
  name: adaptive_id_trigger
  seed: 0
  device: cuda

data:
  dataset: cifar10
  data_dir: ./data
  batch_size: 128
  num_workers: 6
  val_split: 0.2

model:
  type: conv_autoencoder
  start_dim: 6
  max_dim: 128

training:
  epochs: 60
  lr: 0.1
  optimizer: sgd
  loss: mse

trigger:
  type: id
  min_epochs_per_stage: 3
  max_epochs_per_stage: 11
  patience: 3
  twonn_sample_size: 5000
  growth_rate: 1.7

evaluation:
  linear_probe: true
  knn: true
  intrinsic_dim: true
  ordering_score: true